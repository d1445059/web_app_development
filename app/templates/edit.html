{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="glass-card p-4 p-md-5 mt-2">
            <h4 class="mb-4 d-flex align-items-center gap-2 pb-3 border-bottom" style="border-color: var(--border-color) !important;">
                <a href="{{ url_for('main.index') }}" class="text-muted text-decoration-none me-2" title="返回首頁">
                    <i class="ph ph-arrow-left"></i>
                </a>
                編輯帳目 (Edit Record)
            </h4>
            
            <form action="{{ url_for('main.update_transaction', record_id=transaction.id) }}" method="POST">
                <div class="mb-3">
                    <label for="type" class="form-label text-muted small mb-1">屬性 Type</label>
                    <select class="form-select" id="type" name="type" required>
                        <option value="expense" {% if transaction.type == 'expense' %}selected{% endif %}>支出</option>
                        <option value="income" {% if transaction.type == 'income' %}selected{% endif %}>收入</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="amount" class="form-label text-muted small mb-1">金額 Amount</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0" style="border-color: var(--border-color); color: var(--text-muted);">$</span>
                        <input type="number" class="form-control border-start-0 ps-0" id="amount" name="amount" min="0" value="{{ transaction.amount }}" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="category" class="form-label text-muted small mb-1">類別 Category</label>
                    <select class="form-select" id="category" name="category" required>
                        <option value="飲食" {% if transaction.category == '飲食' %}selected{% endif %}>飲食</option>
                        <option value="交通" {% if transaction.category == '交通' %}selected{% endif %}>交通</option>
                        <option value="娛樂" {% if transaction.category == '娛樂' %}selected{% endif %}>娛樂</option>
                        <option value="薪水" {% if transaction.category == '薪水' %}selected{% endif %}>薪水</option>
                        <option value="其他" {% if transaction.category == '其他' %}selected{% endif %}>其他</option>
                    </select>
                </div>
                <div class="mb-5">
                    <label for="note" class="form-label text-muted small mb-1">備註 Note</label>
                    <input type="text" class="form-control" id="note" name="note" value="{{ transaction.note }}">
                </div>
                
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-primary-custom flex-grow-1">
                        儲存變更 (Update)
                    </button>
                    <a href="{{ url_for('main.index') }}" class="btn px-4 py-2" style="border-radius: 8px; border: 1px solid var(--border-color); color: var(--text-muted);">
                        取消 (Cancel)
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
