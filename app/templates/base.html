<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}個人記帳系統{% endblock %}</title>
    <meta name="description" content="高品質、動態且極致美學的個人記帳系統，讓你輕鬆管理每一筆收支。">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS for WOW aesthetic -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Phosphor Icons (for modern icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('main.index') }}">
                <i class="ph-fill ph-wallet text-white" style="font-size: 1.5rem;"></i>
                FinanceFlow
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-4">
        <!-- Flash Messages -->
        <div class="row">
            <div class="col-12 col-lg-10 mx-auto">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show shadow-sm" style="background: rgba({{ '16, 185, 129' if category == 'success' else '239, 68, 68' }}, 0.15); border: 1px solid rgba({{ '16, 185, 129' if category == 'success' else '239, 68, 68' }}, 0.3); color: #fff;" role="alert">
                                <i class="ph ph-{{ 'check-circle' if category == 'success' else 'warning-circle' }} me-2"></i>
                                {{ message }}
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
            </div>
        </div>

        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
